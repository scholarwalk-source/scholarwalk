<style>
  :root{
    --bg:#FBFCFE; --bg-alt:#F1F6FB; --surface:#FFFFFF; --ink:#0F1B2E; --ink-muted:#5B6B82;
    --blue:#2451B8; --blue-deep:#163B7A; --blue-light:#E8EFFC; --green:#1C8C6B; --green-light:#E4F5EE;
    --border:#E4E9F2; --shadow: 0 20px 40px -22px rgba(15,27,46,.18); --shadow-sm: 0 8px 20px -12px rgba(15,27,46,.15);
    --radius-lg:24px; --radius-md:16px; --radius-sm:10px;
    --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif;
    --amber:#9A6B12; --amber-light:#FCF3DF;
  }
  html.dark{
    --bg:#0A0F1D; --bg-alt:#0E1526; --surface:#121A2E; --ink:#EDF1F8; --ink-muted:#93A2BC;
    --blue:#6C97F2; --blue-deep:#9DB9F7; --blue-light:#182644; --green:#3FD3A1; --green-light:#123329;
    --border:#233052; --shadow: 0 24px 48px -22px rgba(0,0,0,.55); --shadow-sm: 0 10px 22px -14px rgba(0,0,0,.5);
    --amber:#E8C36B; --amber-light:#2E2712;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:var(--bg); color:var(--ink); font-family:var(--font-body); line-height:1.5; }
  a{color:inherit; text-decoration:none;}
  button{font-family:inherit; cursor:pointer;}
  svg{display:block;}
  .wrap{ max-width:1180px; margin:0 auto; padding:0 28px; }
  .font-display{ font-family:var(--font-display); }

  header{ position:sticky; top:0; z-index:100; background:color-mix(in srgb, var(--bg) 88%, transparent); backdrop-filter:blur(10px); border-bottom:1px solid var(--border); }
  .nav-inner{ display:flex; align-items:center; justify-content:space-between; padding:16px 28px; max-width:1180px; margin:0 auto; }
  .logo{ display:flex; align-items:center; gap:10px; font-family:var(--font-display); font-weight:700; font-size:20px; letter-spacing:-.01em; }
  .logo-mark{ width:34px; height:34px; flex-shrink:0; }
  nav.links{ display:none; align-items:center; gap:32px; }
  @media(min-width:860px){ nav.links{ display:flex; } }
  nav.links a{ font-size:14.5px; font-weight:500; color:var(--ink-muted); transition:color .2s; }
  nav.links a:hover, nav.links a.active{ color:var(--ink); }
  .nav-right{ display:flex; align-items:center; gap:14px; }

  @media(max-width:480px){
    .nav-inner{ padding:12px 16px; }
    .logo{ font-size:15px; gap:6px; min-width:0; }
    .logo span{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:120px; }
    .logo-mark{ width:26px; height:26px; }
    .nav-right{ gap:6px; }
    .icon-btn{ width:32px; height:32px; }
    .icon-btn svg{ width:15px; height:15px; }
    .lang-btn{ padding:0 9px; height:32px; font-size:11.5px; gap:4px; }
    .lang-btn svg{ width:13px; height:13px; }
    .btn{ padding:9px 14px; font-size:12.5px; }
  }
  .icon-btn{ display:flex; align-items:center; justify-content:center; width:38px; height:38px; border-radius:50%; border:1px solid var(--border); background:var(--surface); color:var(--ink-muted); transition:all .2s; }
  .icon-btn:hover{ color:var(--ink); border-color:var(--blue); }
  .icon-btn svg{ width:17px; height:17px; }
  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:12px 22px; border-radius:999px; font-weight:600; font-size:14.5px; border:1px solid transparent; transition:all .2s ease; white-space:nowrap; }
  .btn-primary{ background:var(--blue); color:#fff; box-shadow:var(--shadow-sm); }
  .btn-primary:hover{ background:var(--blue-deep); transform:translateY(-1px); }
  .btn-outline{ background:transparent; border-color:var(--border); color:var(--ink); }
  .btn-outline:hover{ border-color:var(--green); color:var(--green); }
  .btn-sm{ padding:9px 16px; font-size:13.5px; }

  /* ---------- PAGE HEAD ---------- */
  .page-head{ padding:56px 0 8px; text-align:center; }
  .page-head span.eyebrow{ font-size:13px; font-weight:700; color:var(--green); letter-spacing:.04em; text-transform:uppercase; }
  .page-head h1{ font-family:var(--font-display); font-weight:700; font-size:clamp(30px,4vw,44px); letter-spacing:-.02em; margin:12px 0 10px; }
  .page-head p{ color:var(--ink-muted); font-size:16px; max-width:560px; margin:0 auto; }

  /* ---------- FILTER BAR ---------- */
  .filter-bar{
    max-width:1180px; margin:36px auto 8px; padding:20px 24px; background:var(--surface);
    border:1px solid var(--border); border-radius:var(--radius-lg); box-shadow:var(--shadow-sm);
    display:grid; grid-template-columns:1.3fr 1fr 1fr 1fr; gap:14px; align-items:end;
  }
  @media(max-width:900px){ .filter-bar{ grid-template-columns:1fr 1fr; } }
  @media(max-width:600px){ .filter-bar{ grid-template-columns:1fr; margin:24px 20px; } }
  .filter-field{ display:flex; flex-direction:column; gap:6px; }
  .filter-field label{ font-size:12.5px; font-weight:600; color:var(--ink-muted); }
  .filter-field .input-wrap{ position:relative; }
  .filter-field .input-wrap svg{ position:absolute; left:14px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--ink-muted); }
  .filter-field input, .filter-field select{
    width:100%; height:46px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--bg-alt);
    color:var(--ink); font-family:inherit; font-size:14px; padding:0 16px 0 40px;
  }
  .filter-field select{ padding:0 16px; appearance:none; background-image:url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235B6B82' stroke-width='2'%3E%3Cpath d='m6 9 6 6 6-6'/%3E%3C/svg%3E"); background-repeat:no-repeat; background-position:right 14px center; background-size:16px; }
  .filter-field input:focus, .filter-field select:focus{ outline:none; border-color:var(--blue); }

  /* ---------- RESULTS ---------- */
  .results-meta{ max-width:1180px; margin:26px auto 6px; padding:0 28px; font-size:14px; color:var(--ink-muted); }
  .scholarship-grid{ padding:14px 0 100px; display:grid; grid-template-columns:1fr; gap:16px; }
  @media(min-width:720px){ .scholarship-grid{ grid-template-columns:1fr 1fr; } }
  .scholarship-card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md);
    padding:24px; transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    display:flex; flex-direction:column; gap:12px;
  }
  .scholarship-card:hover{ transform:translateY(-3px); box-shadow:var(--shadow); border-color:transparent; }
  .scholarship-card h3{ font-family:var(--font-display); font-size:17px; font-weight:600; line-height:1.3; }
  .scholarship-card p.desc{ font-size:13.8px; color:var(--ink-muted); flex-grow:1; }
  .tag-row{ display:flex; flex-wrap:wrap; gap:6px; }
  .tag{ font-size:12px; font-weight:600; padding:5px 11px; border-radius:999px; background:var(--blue-light); color:var(--blue); white-space:nowrap; }
  .tag.green{ background:var(--green-light); color:var(--green); }
  .tag.amber{ background:var(--amber-light); color:var(--amber); }
  .card-footer{ display:flex; justify-content:space-between; align-items:center; margin-top:6px; padding-top:12px; border-top:1px solid var(--border); }
  .card-footer .save-btn{ display:flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:var(--ink-muted); }
  .card-footer .save-btn svg{ width:16px; height:16px; }

  /* ---------- SKELETON ---------- */
  .skeleton-card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); padding:24px; }
  .skeleton-line{ height:12px; border-radius:6px; background:var(--amber-light, #E9EEF5); animation:skPulse 1.3s ease-in-out infinite; margin-bottom:10px; }
  .skeleton-line.w80{ width:80%; } .skeleton-line.w50{ width:50%; } .skeleton-line.w30{ width:30%; height:22px; margin-top:8px; }
  @keyframes skPulse{ 0%,100%{ opacity:1; } 50%{ opacity:.55; } }
  .load-more-wrap{ text-align:center; margin:10px 0 60px; }
  .load-more-btn{ padding:13px 30px; border-radius:999px; border:1px solid var(--border); background:var(--surface); font-weight:600; font-size:14px; color:var(--ink); }
  .load-more-btn:hover{ border-color:var(--blue); color:var(--blue); }
  .load-more-btn:disabled{ opacity:.5; cursor:default; }
  .card-footer .save-btn:hover{ color:var(--blue); }

  .empty{ text-align:center; padding:80px 20px; color:var(--ink-muted); }

  footer{ border-top:1px solid var(--border); padding:32px 0; text-align:center; font-size:13.5px; color:var(--ink-muted); }
</style>
</head>

/* ---------------- BUILD FILTER OPTIONS ---------------- */
function uniqueSorted(values){
  return [...new Set(values)].sort((a,b)=>a.localeCompare(b));
}
const nationalitySet = new Set();
const hostSet = new Set();
const programSet = new Set();
SCHOLARSHIP_DB.forEach(s=>{
  s.nationality.split(',').forEach(n=>{ n=n.trim().replace('…',''); if(n) nationalitySet.add(n); });
  s.host.split(',').forEach(h=>{ h=h.trim().replace('…',''); if(h) hostSet.add(h); });
  s.programs.split(',').forEach(p=>{ p=p.trim().replace('…',''); if(p) programSet.add(p); });
});
const nationalityFilter = document.getElementById('nationalityFilter');
uniqueSorted([...nationalitySet]).forEach(n=>{
  const opt = document.createElement('option'); opt.value = n; opt.textContent = n; nationalityFilter.appendChild(opt);
});
const hostFilter = document.getElementById('hostFilter');
uniqueSorted([...hostSet]).forEach(h=>{
  const opt = document.createElement('option'); opt.value = h; opt.textContent = h; hostFilter.appendChild(opt);
});
const programFilter = document.getElementById('programFilter');
uniqueSorted([...programSet]).forEach(p=>{
  const opt = document.createElement('option'); opt.value = p; opt.textContent = p; programFilter.appendChild(opt);
});

/* Simulated async "API" — filters + paginates server-side style,
   with an artificial delay so the loading skeleton has something
   to show. */
function fetchScholarships({ filters, page, pageSize }){
  return new Promise(resolve=>{
    setTimeout(()=>{
      const matched = SCHOLARSHIP_DB.filter(s=>{
        const matchesQ = !filters.q || s.name.toLowerCase().includes(filters.q) || s.desc.toLowerCase().includes(filters.q);
        const matchesNat = !filters.nat || s.nationality.includes(filters.nat);
        const matchesHost = !filters.host || s.host.includes(filters.host);
        const matchesProg = !filters.prog || s.programs.includes(filters.prog);
        return matchesQ && matchesNat && matchesHost && matchesProg;
      });
      const end = page * pageSize;
      resolve({ results: matched.slice(0, end), total: matched.length, hasMore: end < matched.length });
    }, 380); /* simulated network latency */
  });
}

/* ---------------- RENDER ---------------- */
const grid = document.getElementById('scholarshipGrid');
const meta = document.getElementById('resultsMeta');
const loadMoreWrap = document.getElementById('loadMoreWrap');
const loadMoreBtn = document.getElementById('loadMoreBtn');
const savedKey = 'scholarwalk_saved_scholarships';
let saved = new Set();
const PAGE_SIZE = 8;
let currentPage = 1;
let isLoading = false;

function bookmarkIcon(filled){
  return filled
    ? '<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M19 21 12 16l-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21 12 16l-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>';
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str ?? '';
  return div.innerHTML;
}

function renderSkeleton(count){
  grid.innerHTML = Array.from({length: count}).map(()=>`
    <div class="skeleton-card">
      <div class="skeleton-line w80"></div>
      <div class="skeleton-line w50"></div>
      <div class="skeleton-line w30"></div>
    </div>`).join('');
}

function renderCard(s, idx){
  const card = document.createElement('div');
  card.className = 'scholarship-card';
  const isSaved = saved.has(s.name+idx);
  card.innerHTML = `
    <h3>${escapeHtml(s.name)}</h3>
    <p class="desc">${escapeHtml(s.desc)}</p>
    <div class="tag-row">
      <span class="tag">🌍 ${escapeHtml(s.nationality)}</span>
      <span class="tag green">📍 ${escapeHtml(s.host)}</span>
      <span class="tag amber">🎓 ${escapeHtml(s.programs)}</span>
    </div>
    <div class="card-footer">
      <button class="save-btn" data-id="${s.name+idx}">${bookmarkIcon(isSaved)} ${isSaved ? 'Saved' : 'Save'}</button>
      <button class="btn btn-outline btn-sm guidance-btn" data-name="${escapeHtml(s.name)}">Get guidance →</button>
    </div>`;
  return card;
}

function attachCardListeners(){
  grid.querySelectorAll('.guidance-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      sessionStorage.setItem('scholarwalk_interest', JSON.stringify({
        type: 'scholarship',
        name: btn.dataset.name
      }));
      window.location.href = 'signup.html';
    });
  });
  grid.querySelectorAll('.save-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.dataset.id;
      if(saved.has(id)){ saved.delete(id); btn.innerHTML = bookmarkIcon(false) + ' Save'; }
      else{ saved.add(id); btn.innerHTML = bookmarkIcon(true) + ' Saved'; }
    });
  });
}

function getFilters(){
  return {
    q: document.getElementById('searchInput').value.trim().toLowerCase(),
    nat: nationalityFilter.value,
    host: hostFilter.value,
    prog: programFilter.value
  };
}

async function loadResults(page){
  isLoading = true;
  if(page === 1) renderSkeleton(4);
  loadMoreBtn.disabled = true;
  loadMoreBtn.textContent = 'Loading…';

  const { results, total, hasMore } = await fetchScholarships({ filters: getFilters(), page, pageSize: PAGE_SIZE });

  grid.innerHTML = '';
  meta.textContent = `${total} scholarship${total===1?'':'s'} found`;
  if(total === 0){
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1;">No scholarships match your filters. Try broadening your search.</div>`;
  } else {
    results.forEach((s, idx)=> grid.appendChild(renderCard(s, idx)));
    attachCardListeners();
  }

  loadMoreWrap.style.display = hasMore ? 'block' : 'none';
  loadMoreBtn.disabled = false;
  loadMoreBtn.textContent = 'Load more scholarships';
  isLoading = false;
}

function resetAndLoad(){ currentPage = 1; loadResults(1); }

document.getElementById('searchInput').addEventListener('input', resetAndLoad);
nationalityFilter.addEventListener('change', resetAndLoad);
hostFilter.addEventListener('change', resetAndLoad);
programFilter.addEventListener('change', resetAndLoad);

loadMoreBtn.addEventListener('click', ()=>{
  if(isLoading) return;
  currentPage++;
  loadResults(currentPage);
});

loadResults(1);
</script>
