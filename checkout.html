<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="description" content="Review your ScholarWalk application details and complete secure payment via Stripe.">
<meta property="og:title" content="Checkout — ScholarWalk">
<meta property="og:description" content="Review your ScholarWalk application details and complete secure payment via Stripe.">
<meta property="og:type" content="website">
<title>Checkout — ScholarWalk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FBFCFE; --bg-alt:#F1F6FB; --surface:#FFFFFF; --ink:#0F1B2E; --ink-muted:#5B6B82;
    --blue:#2451B8; --blue-deep:#163B7A; --blue-light:#E8EFFC; --green:#1C8C6B; --green-light:#E4F5EE;
    --border:#E4E9F2; --shadow: 0 20px 40px -22px rgba(15,27,46,.18); --shadow-sm: 0 8px 20px -12px rgba(15,27,46,.15);
    --radius-lg:24px; --radius-md:16px; --radius-sm:10px;
    --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif;
    --amber:#9A6B12; --amber-light:#FCF3DF;
  }
  html.dark{
    --bg:#0A0F1D; --bg-alt:#0E1526; --surface:#121A2E; --ink:#EDF1F8; --ink-muted:#93A2BC;
    --blue:#6C97F2; --blue-deep:#9DB9F7; --blue-light:#182644; --green:#3FD3A1; --green-light:#123329;
    --border:#233052; --shadow: 0 24px 48px -22px rgba(0,0,0,.55); --shadow-sm: 0 10px 22px -14px rgba(0,0,0,.5);
    --amber:#E8C36B; --amber-light:#2E2712;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:var(--bg); color:var(--ink); font-family:var(--font-body); line-height:1.5; }
  a{color:inherit; text-decoration:none;}
  button{font-family:inherit; cursor:pointer;}
  svg{display:block;}
  .wrap{ max-width:640px; margin:0 auto; padding:0 24px; }

  header{ position:sticky; top:0; z-index:100; background:color-mix(in srgb, var(--bg) 88%, transparent); backdrop-filter:blur(10px); border-bottom:1px solid var(--border); }
  .nav-inner{ display:flex; align-items:center; justify-content:space-between; padding:16px 28px; max-width:1180px; margin:0 auto; }
  .logo{ display:flex; align-items:center; gap:10px; font-family:var(--font-display); font-weight:700; font-size:20px; letter-spacing:-.01em; }
  @media(max-width:480px){
    .nav-inner{ padding:12px 16px; }
    .logo{ font-size:15px; gap:6px; min-width:0; }
    .logo span{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:120px; }
    .logo-mark{ width:26px; height:26px; }
    .icon-btn{ width:32px; height:32px; }
    .icon-btn svg{ width:15px; height:15px; }
    .btn{ padding:9px 14px; font-size:12.5px; }
  }
  .logo-mark{ width:34px; height:34px; flex-shrink:0; }
  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:12px 22px; border-radius:999px; font-weight:600; font-size:14.5px; border:1px solid transparent; transition:all .2s ease; }
  .btn-outline{ background:transparent; border-color:var(--border); color:var(--ink); }
  .btn-outline:hover{ border-color:var(--green); color:var(--green); }
  .icon-btn{ display:flex; align-items:center; justify-content:center; width:38px; height:38px; border-radius:50%; border:1px solid var(--border); background:var(--surface); color:var(--ink-muted); }

  .page-head{ padding:56px 0 30px; text-align:center; }
  .page-head span.eyebrow{ font-size:13px; font-weight:700; color:var(--green); letter-spacing:.04em; text-transform:uppercase; }
  .page-head h1{ font-family:var(--font-display); font-weight:700; font-size:clamp(28px,4vw,38px); letter-spacing:-.02em; margin:12px 0 8px; }
  .page-head p{ color:var(--ink-muted); font-size:15.5px; }

  .summary-card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); box-shadow:var(--shadow); padding:32px; margin-bottom:24px; }
  .summary-row{ display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:1px dashed var(--border); font-size:14.5px; }
  .summary-row:last-of-type{ border-bottom:none; }
  .summary-row .label{ color:var(--ink-muted); }
  .summary-row .value{ font-weight:600; }
  .summary-total{ display:flex; justify-content:space-between; align-items:center; padding-top:20px; margin-top:6px; border-top:1px solid var(--border); }
  .summary-total .label{ font-family:var(--font-display); font-weight:600; font-size:17px; }
  .summary-total .value{ font-family:var(--font-display); font-weight:700; font-size:28px; color:var(--blue); }

  .pay-btn{
    width:100%; padding:16px; border-radius:var(--radius-sm); border:none; background:var(--blue); color:#fff;
    font-family:var(--font-display); font-weight:600; font-size:16px; display:flex; align-items:center; justify-content:center; gap:10px;
    box-shadow:var(--shadow-sm); transition:all .2s ease;
  }
  .pay-btn:hover{ background:var(--blue-deep); transform:translateY(-1px); }
  .pay-btn svg{ width:20px; height:20px; }
  .secure-note{ display:flex; align-items:center; justify-content:center; gap:6px; font-size:12.5px; color:var(--ink-muted); margin-top:14px; }
  .secure-note svg{ width:14px; height:14px; }

  .edit-link{ display:block; text-align:center; margin-top:18px; font-size:14px; color:var(--blue); font-weight:600; }

  .setup-note{
    background:var(--amber-light); border:1px solid var(--amber); border-radius:var(--radius-md);
    padding:20px 22px; font-size:13.5px; color:var(--ink); margin-top:36px; line-height:1.65;
  }
  .setup-note strong{ color:var(--amber); display:block; margin-bottom:6px; font-family:var(--font-display); font-size:14.5px; }
  .setup-note code{ background:var(--surface); padding:2px 6px; border-radius:5px; font-size:12.5px; }

  .empty-state{ text-align:center; padding:60px 24px; color:var(--ink-muted); }
  .empty-state a{ color:var(--blue); font-weight:600; }

  footer{ border-top:1px solid var(--border); padding:32px 0; text-align:center; font-size:13.5px; color:var(--ink-muted); margin-top:60px; }
</style>
</head>
<body>

<header>
  <div class="nav-inner">
    <a href="index.html" class="logo">
      <svg class="logo-mark" viewBox="0 0 34 34" fill="none">
        <circle cx="17" cy="17" r="16" stroke="var(--blue)" stroke-width="2"/>
        <path d="M9 14.5L17 10L25 14.5L17 19L9 14.5Z" fill="var(--blue)"/>
        <path d="M12.5 16.3V21C12.5 21 14.5 23 17 23C19.5 23 21.5 21 21.5 21V16.3" stroke="var(--green)" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span>ScholarWalk</span>
    </a>
    <div style="display:flex; align-items:center; gap:14px;">
      <button class="icon-btn" id="darkToggle" aria-label="Toggle dark mode">
        <svg id="darkIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>
      </button>
      <a href="index.html" class="btn btn-outline">Back to home</a>
    </div>
  </div>
</header>

<div id="app">
  <!-- filled by JS -->
</div>

<footer>
  <div class="wrap" style="max-width:1180px;">ScholarWalk provides application guidance only and does not guarantee visa approval.</div>
    <div style="display:flex; gap:10px; justify-content:center; margin-top:14px;">
      <a href="https://www.instagram.com/scholarwalkco" target="_blank" rel="noopener" aria-label="Instagram" style="width:34px; height:34px; border-radius:50%; border:1px solid var(--border); background:var(--surface); color:var(--ink-muted); display:flex; align-items:center; justify-content:center;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="2" width="20" height="20" rx="5.5"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.3" cy="6.7" r="1"/></svg>
      </a>
      <a href="https://www.facebook.com/profile.php?id=61591797042146" target="_blank" rel="noopener" aria-label="Facebook" style="width:34px; height:34px; border-radius:50%; border:1px solid var(--border); background:var(--surface); color:var(--ink-muted); display:flex; align-items:center; justify-content:center;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M15 3h-2a5 5 0 0 0-5 5v3H6v4h2v6h4v-6h3l1-4h-4V8a1 1 0 0 1 1-1h3z"/></svg>
      </a>
      <a href="https://www.tiktok.com/@scholarwalk?lang=en" target="_blank" rel="noopener" aria-label="TikTok" style="width:34px; height:34px; border-radius:50%; border:1px solid var(--border); background:var(--surface); color:var(--ink-muted); display:flex; align-items:center; justify-content:center;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 3c.4 2.2 1.8 3.7 4 4v3c-1.5 0-2.9-.4-4-1.2v6.4a5.6 5.6 0 1 1-5.6-5.6c.3 0 .6 0 .9.1v3.1a2.5 2.5 0 1 0 1.8 2.4V3z"/></svg>
      </a>
    </div>
</footer>

<script>
/* dark mode */
const darkIcon = document.getElementById('darkIcon');
document.getElementById('darkToggle').addEventListener('click', ()=>{
  document.documentElement.classList.toggle('dark');
  const isDark = document.documentElement.classList.contains('dark');
  darkIcon.innerHTML = isDark
    ? '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>'
    : '<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/>';
});

/* ============================================================
   REPLACE THESE with your real Stripe Payment Links.
   Create one Payment Link per tier in your Stripe Dashboard
   (Payment Links → New), set its price to match, and set
   "After payment" → Redirect customers to this URL:
     https://yourdomain.com/success.html
   Then paste each link's URL below.
   ============================================================ */
/* ============================================================
   NOTE: these are Stripe TEST MODE links (URLs contain "/test_").
   Test-mode payments don't charge real cards and won't show up
   in your live Stripe balance — this is expected while you're
   testing the flow. Before launch, create the equivalent LIVE
   mode Payment Links in your Stripe Dashboard (toggle out of
   Test mode first) and swap these URLs for the live ones.
   ============================================================ */
const STRIPE_LINKS = {
  quick_check:        "https://buy.stripe.com/test_4gM5kE3tC68Of6KghHa3u07",
  scholarship_match:  "https://buy.stripe.com/test_3cIeVeggo54K7Eic1ra3u04",
  application_review: "https://buy.stripe.com/test_9B65kEc0854K7EifdDa3u05",
  premium_roadmap:    "https://buy.stripe.com/test_aFaaEY8NW0OucYCfdDa3u06"
};

const app = document.getElementById('app');
const raw = sessionStorage.getItem('scholarwalk_signup');

if(!raw){
  app.innerHTML = `
    <div class="wrap">
      <div class="empty-state">
        <p>We couldn't find a pending signup.</p>
        <p style="margin-top:8px;"><a href="signup.html">Start your sign up →</a></p>
      </div>
    </div>`;
} else {
  const data = JSON.parse(raw);
  app.innerHTML = `
    <div class="page-head">
      <span class="eyebrow">Step 4 of 4</span>
      <h1>Review &amp; pay</h1>
      <p>Confirm your details below, then complete payment securely with Stripe.</p>
    </div>
    <div class="wrap">
      <div class="summary-card">
        <div class="summary-row"><span class="label">Name</span><span class="value">${escapeHtml(data.fullName)}</span></div>
        <div class="summary-row"><span class="label">Email</span><span class="value">${escapeHtml(data.email)}</span></div>
        <div class="summary-row"><span class="label">Citizenship</span><span class="value">${escapeHtml(data.citizenship)}</span></div>
        <div class="summary-row"><span class="label">Degree level</span><span class="value">${escapeHtml(data.degreeLevel)}</span></div>
        <div class="summary-row"><span class="label">Target country</span><span class="value">${escapeHtml(data.targetCountry)}</span></div>
        <div class="summary-row"><span class="label">Field of study</span><span class="value">${escapeHtml(data.fieldOfStudy)}</span></div>
        ${data.scholarshipInterest ? `<div class="summary-row"><span class="label">Scholarship of interest</span><span class="value">${escapeHtml(data.scholarshipInterest)}</span></div>` : ''}
        <div class="summary-row"><span class="label">Package</span><span class="value">${escapeHtml(data.packageLabel)}</span></div>
        <div class="summary-total"><span class="label">Total due today</span><span class="value">$${escapeHtml(data.price)}</span></div>
      </div>

      <div style="display:flex; gap:10px; align-items:flex-start; background:var(--green-light); color:var(--green); border-radius:var(--radius-md); padding:14px 18px; margin-bottom:20px; font-size:13px; font-weight:600;">
        <svg style="width:18px; height:18px; flex-shrink:0; margin-top:1px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
        <span>Change your mind? Upgrade to a higher package within 7 days and we'll credit the ${escapeHtml(data.price)} you paid today toward it.</span>
      </div>

      <button class="pay-btn" id="payBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
        Pay $${escapeHtml(data.price)} with Stripe
      </button>
      <p class="secure-note">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 4 5v6c0 5 3.4 8.7 8 11 4.6-2.3 8-6 8-11V5l-8-3Z"/></svg>
        Payments are processed securely by Stripe. ScholarWalk never sees your card details.
      </p>
      <a href="signup.html" class="edit-link">← Edit my information</a>

      <div class="setup-note">
        <strong>Setup note (for the site owner)</strong>
        The four Payment Links in <code>STRIPE_LINKS</code> are currently <strong>Stripe test-mode links</strong>
        (their URLs contain <code>/test_</code>) — they won't charge real cards. Before launch, create four
        matching <strong>live-mode</strong> Payment Links in your Stripe Dashboard (Quick Check $19, Scholarship
        Match $39, Application Review $65, Premium Roadmap $99) and swap the URLs in. Each link's "after
        payment" redirect should point to <code>https://yourdomain.com/success.html</code>. The checkout handler
        below automatically appends <code>prefilled_email</code> and <code>client_reference_id</code> to the
        link — both are natively supported by Stripe Payment Links, live or test.
      </div>
    </div>`;

  document.getElementById('payBtn').addEventListener('click', ()=> redirectToStripeCheckout(data));
}

/**
 * ============================================================
 * STRIPE CHECKOUT HANDLER
 *
 * Today this wraps a static Stripe Payment Link, but it's written
 * as its own function so it's a clean swap-in point later if you
 * move to a dynamic backend-created Checkout Session (e.g. to
 * support add-ons/upsells with variable pricing). In that future
 * version, this function would instead POST to your backend,
 * receive a Checkout Session URL back, and redirect to that.
 *
 * Right now it does two things Stripe Payment Links support
 * natively, no backend needed:
 *   - prefilled_email: pre-fills the customer's email on Stripe's
 *     hosted checkout page, so they don't retype it.
 *   - client_reference_id: a free-form ID Stripe attaches to the
 *     resulting payment/session, so you can match a completed
 *     payment back to this specific application later (e.g. via
 *     a Stripe webhook, or manually in the Stripe Dashboard).
 * ============================================================
 */
function redirectToStripeCheckout(data){
  const url = STRIPE_LINKS[data.package];
  if(!url || url.includes('REPLACE_WITH')){
    alert('Stripe Payment Link not set up yet for "' + data.packageLabel + '". See the setup note below the button.');
    return;
  }
  const checkoutUrl = new URL(url);
  if(data.email) checkoutUrl.searchParams.set('prefilled_email', data.email);
  const referenceId = (data.email ? data.email.replace(/[^a-zA-Z0-9]/g, '_') : 'applicant') + '_' + Date.now();
  checkoutUrl.searchParams.set('client_reference_id', referenceId);
  window.location.href = checkoutUrl.toString();
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str ?? '';
  return div.innerHTML;
}
</script>
</body>
</html>
